[env]
; Cross-platform settings: these belong here because future non-ESP32 envs
; (Heltec V3, RAK4631) will also inherit from [env]. ESP32-specific flags
; live in [esp32_base] below, so they do not leak to nRF52 builds.
extra_scripts = pre:scripts/git_rev.py
monitor_speed = 115200
upload_speed = 115200
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*

[esp32_base]
; ESP32-S3 (espressif32/arduino) anchor — inherited by every ESP32 env via
; "extends = esp32_base". This isolates the USB-CDC and platform flags so
; a future nRF52 env in [nrf52_base] never picks them up from [env].
platform = espressif32
framework = arduino
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Uncomment to enable the `panic` console command — deliberately crashes the
    ; node to exercise the panic/backtrace capture path (UART0 GPIO43 + bootlog
    ; ring). Debug aid only; leave commented for release builds.
    ; -DDEBUG_PANIC_CMD

[env:heltec_v4]
extends = esp32_base
board = heltec_wifi_lora_32_V3
lib_deps =
    jgromes/RadioLib@^7.0.0
    olikraus/U8g2@^2.35.30
    h2zero/NimBLE-Arduino@^1.4.2
build_flags =
    ${esp32_base.build_flags}
    -DDEVICE_HELTEC_V4
    ; Sidetone is an I2S stream into a MAX98357A class-D amp (see sidetone.cpp /
    ; docs/components/max98357a.md). The old PWM/PAM8403 LEDC paths and their
    ; -DSIDETONE_SQUARE switch are gone.
    ; MAX98357A I2S pin map (authoritative — pins.h falls back to these if unset):
    ;   GPIO48 -> BCLK, GPIO4 -> LRC, GPIO47 -> DIN.
    -DPIN_I2S_BCLK=48
    -DPIN_I2S_LRCLK=4
    -DPIN_I2S_DIN=47

[env:heltec_v3]
; Heltec WiFi LoRa 32 V3 — ESP32-S3 + on-board SX1262, NO external FEM.
; The V3 is the low-power sibling of the V4: same radio/OLED/NimBLE/I2S wiring,
; same pinout for SX1262 (NSS=8, DIO1=14, NRST=12, BUSY=13), same SSD1306 OLED
; (I2C 17/18/21), same MAX98357A I2S sidetone wiring as V4.  The ONLY hardware
; difference that touches firmware is the battery-ADC gate polarity:
;   V4 gate (GPIO37) is active-HIGH  (BATT_GATE_ACTIVE_HIGH=1)
;   V3 gate (GPIO37) is active-LOW   (BATT_GATE_ACTIVE_HIGH=0)
; See src/pins.h and src/battery.cpp for the parameterised gate handling.
; NOTE: hardware validation is pending (no V3 unit in-hand); build-only verified.
extends = esp32_base
board = heltec_wifi_lora_32_V3
lib_deps =
    jgromes/RadioLib@^7.0.0
    olikraus/U8g2@^2.35.30
    h2zero/NimBLE-Arduino@^1.4.2
build_flags =
    ${esp32_base.build_flags}
    -DDEVICE_HELTEC_V3
    ; Sidetone: same I2S → MAX98357A path as V4. Same pin assignments apply.
    ; MAX98357A I2S pin map (authoritative — pins.h falls back to these if unset):
    ;   GPIO48 -> BCLK, GPIO4 -> LRC, GPIO47 -> DIN.
    -DPIN_I2S_BCLK=48
    -DPIN_I2S_LRCLK=4
    -DPIN_I2S_DIN=47

[env:cardputer_adv]
extends = esp32_base
board = m5stack-stamps3
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
; Radio is the removable Cap LoRa-1262 (bare SX1262, no external PA): max TX is
; the chip ceiling +22 dBm. M5Unified drives the ES8311 codec (sidetone via
; M5.Speaker) and the ST7789V2 LCD (display via M5.Display / M5GFX); it bundles
; M5GFX, so no separate LovyanGFX dep is needed.
lib_deps =
    jgromes/RadioLib@^7.0.0
    m5stack/M5Unified@^0.2.2
    h2zero/NimBLE-Arduino@^1.4.2
build_flags =
    ${esp32_base.build_flags}
    -DDEVICE_CARDPUTER_ADV

[nrf52_base]
; nRF52840 (Adafruit nRF5 core / SoftDevice S140) anchor — inherited by every
; nRF52 env via "extends = nrf52_base". Mirrors [esp32_base]'s role: keeps
; platform/framework/variant plumbing out of [env] so it never leaks to the
; ESP32 builds. The WisCore_RAK4631_Board variant is not in the stock Adafruit
; core, so we vendor it (see variants/WisCore_RAK4631_Board/ and
; reference/rak4631/README.md for provenance) and point the board build at it.
platform = nordicnrf52
framework = arduino
board_build.variants_dir = variants

[env:rak4631]
; RAKwireless RAK4631 (WisCore) — nRF52840 + on-board SX1262 (no FEM), RAK1921
; SSD1306 OLED, RAK19007 base board. Cross-MCU port (Phase 2 of
; RAK-port-plan.md): different core (nRF5/Adafruit, SoftDevice S140), different
; radio bus (global SPI, not HSPI), different BLE stack (Bluefruit, not
; NimBLE), different persistence (LittleFS, not NVS/Preferences). See
; src/platform_nrf52.cpp, src/kv_nrf52.cpp, src/ble_provision_nrf52.cpp,
; src/sidetone_nrf52.cpp (16-bit PCM over the nRF52840 I2S peripheral into a
; MAX98357A amp — same DDS/raised-cosine design as the Heltec I2S path).
;
; Sidetone amp is a BUILD-TIME choice (see src/sidetone_nrf52.cpp):
;   default            -> I2S into a MAX98357A class-D amp (digital). Pins below.
;   -DSIDETONE_PAM8403 -> PWM (one pin) -> RC low-pass -> PAM8403 analog amp.
; To use the analog PAM8403 path, add to build_flags:
;       -DSIDETONE_PAM8403 -DPIN_SIDETONE_PWM=16
; That single PWM pin (default GPIO16, TX1/J10-3) feeds an external RC
; (~1k + 100nF) into the PAM8403 line input; the I2S pins below are then unused.
;
; I2S sidetone pin map (authoritative — pins.h falls back to these if unset).
; Lands on the RAK19007 2.54mm solder headers (J10/J11); the board-to-board
; sensor slots are NOT broken out there. BCLK=17 (IO1, J11-2), LRCK=31 (AIN1,
; J11-1), DIN=16 (TX1, J10-3). Tie the MAX98357A GAIN pin to VIN (a floating
; GAIN -> intermittent distortion; see docs/components/max98357a.md). WB_IO2
; (GPIO34) is the 3V3_S rail control and must NOT be used as a signal pin.
;
; SX1262 pin map (authoritative — pins.h falls back to these if unset; see §2
; of RAK-port-plan.md / reference/rak4631/README.md for provenance):
;   NSS=42 DIO1=47 NRST=38 BUSY=46 SCK=43 MISO=45 MOSI=44
;   SX126X_POWER_EN=37 (MUST be driven HIGH before radio init — powers the
;   SX1262 LDO; see radio.cpp). DIO2=RF switch, DIO3=TCXO (1.8V).
; NOTE: hardware validation is pending — no RAK4631 unit in-hand; build-only.
extends = nrf52_base
board = wiscore_rak4631
lib_deps =
    jgromes/RadioLib@^7.0.0
    olikraus/U8g2@^2.35.30
build_flags =
    -DDEVICE_RAK4631
    -DPIN_NSS=42 -DPIN_DIO1=47 -DPIN_NRST=38 -DPIN_BUSY=46
    -DPIN_SCK=43 -DPIN_MISO=45 -DPIN_MOSI=44
    -DSX126X_POWER_EN=37
    -DPIN_I2S_BCLK=17 -DPIN_I2S_LRCLK=31 -DPIN_I2S_DIN=16
    ; Flash-shrink note: MeshCore mirrors several RADIOLIB_EXCLUDE_* defines to
    ; trim RadioLib for the nRF52 budget, but RadioLib 7.7.x's module headers
    ; have inter-module type aliases (RFM2x -> SI443X, SX123x -> RF69) that
    ; break with a partial exclude set ("'Si4432' does not name a type" etc).
    ; Omitted here — the build fits comfortably without trimming (see the
    ; flash/RAM totals in TODO.md / RAK-port-plan.md). Revisit only if a future
    ; library bump pushes us over budget; would need the *complete* dependent
    ; set excluded together (CC1101+RF69+SX123x+SX128x+SX127x+RFM2x+SI443X).
upload_protocol = nrfutil

[env:wio_tracker_l1]
; Seeed Wio Tracker L1 Pro — nRF52840 + Wio-SX1262 (SX1262, no FEM), SSD1306
; 128x64 OLED (I2C), built-in passive piezo buzzer for sidetone, on-board
; buttons for the Morse key. Sibling of [env:rak4631]; reuses the nRF52 backend
; (platform_nrf52 / kv_nrf52 / ble_provision_nrf52) and the global-SPI SX1262
; path in radio.cpp. See wio-tracker-port.md.
;
; Sidetone is the built-in passive buzzer: a square wave on PIN_BUZZER (-> NPN
; -> piezo). Selected by -DSIDETONE_BUZZER (see src/sidetone_nrf52.cpp).
;
; Pin map resolved from the vendored variants/Seeed_Wio_Tracker_L1/variant.h +
; variant.cpp (upstream Meshtastic seeed_wio_tracker_L1, no L1-Pro-specific
; variant exists upstream — see reference/wio-tracker-l1-pro/README.md). Values
; below are ARDUINO LOGICAL pin numbers (the D-index into g_ADigitalPinMap),
; matching how radio.cpp/pins.h call pinMode/digitalWrite/RadioLib's Module —
; NOT raw absolute nRF GPIO numbers (this variant's pin map is NOT identity,
; unlike the RAK4631's).
;   LoRa:    NSS=D4(46) DIO1=D1(7) NRST=D2(39) BUSY=D3(42)
;            SCK=D8(30) MISO=D9(3) MOSI=D10(28)  RF switch: LoRa_SW=D5 (SX126X_RXEN),
;            SX126X_DIO2_AS_RF_SWITCH also asserted upstream — keep DIO2 default,
;            confirm in W3 whether D5 also needs driving. TCXO = 1.8V (DIO3).
;            No LoRa power-enable GPIO (always-on LDO) — do not set SX126X_POWER_EN.
;   OLED:    SDA=D14(6) SCL=D15(5), no reset line.
;   Buzzer:  PIN_BUZZER=D12(32), active-high square wave.
;   Buttons: Menu_Key=D13(8) -> PIN_KEY; no separate "Rot_Key" exists on this
;            board (schematic only shows Menu_Key + a 5-way Joystick) — use the
;            Joystick_Press (TB_PRESS=D29) as PIN_MODE_BTN.
;   Battery: VBAT_ADC=D16(31), gated by BAT_CTL=D30(4) (drive HIGH to enable
;            divider per upstream initVariant(); ADC_MULTIPLIER=2.0).
extends = nrf52_base
board = seeed_wio_tracker_l1
lib_deps =
    jgromes/RadioLib@^7.0.0
    olikraus/U8g2@^2.35.30
build_flags =
    -DDEVICE_WIO_TRACKER_L1
    -DSIDETONE_BUZZER
    ; --- SX1262 (Arduino logical pin numbers; see comment block above) ---
    -DPIN_NSS=4 -DPIN_DIO1=1 -DPIN_NRST=2 -DPIN_BUSY=3
    -DPIN_SCK=8 -DPIN_MISO=9 -DPIN_MOSI=10
    ; --- buzzer + buttons ---
    -DPIN_BUZZER=12
    -DPIN_KEY=13 -DPIN_MODE_BTN=29
    ; --- battery (gated divider; CONFIRM ratio/polarity on the bench in W6) ---
    -DPIN_VBAT_ADC=16 -DPIN_VBAT_CTRL=30
    ; Flash-shrink note from [env:rak4631] applies — skip RADIOLIB_EXCLUDE_*.
upload_protocol = nrfutil
