[env]
platform = espressif32
framework = arduino
extra_scripts = pre:scripts/git_rev.py
monitor_speed = 115200
upload_speed = 115200
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[env:heltec_v4]
board = heltec_wifi_lora_32_V3
lib_deps =
    jgromes/RadioLib@^7.0.0
    olikraus/U8g2@^2.35.30
build_flags =
    ${env.build_flags}
    -DDEVICE_HELTEC_V4
    ; Square-wave sidetone. The PWM-sine path (default in sidetone.cpp) needs
    ; more bring-up — the ISR duty-update sequence didn't drive the speaker even
    ; with the RC filter fitted. Parked here until revisited.
    -DSIDETONE_SQUARE

[env:cardputer_adv]
board = m5stack-stamps3
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
lib_deps =
    jgromes/RadioLib@^7.0.0
    lovyan03/LovyanGFX@^1.1.16
build_flags =
    ${env.build_flags}
    -DDEVICE_CARDPUTER_ADV
