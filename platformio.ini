[env]
platform = espressif32
framework = arduino
extra_scripts = pre:scripts/git_rev.py
monitor_speed = 115200
upload_speed = 115200
upload_port = /dev/cu.usbmodem*
monitor_port = /dev/cu.usbmodem*
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Uncomment to enable the `panic` console command — deliberately crashes the
    ; node to exercise the panic/backtrace capture path (UART0 GPIO43 + bootlog
    ; ring). Debug aid only; leave commented for release builds.
    ; -DDEBUG_PANIC_CMD

[env:heltec_v4]
board = heltec_wifi_lora_32_V3
lib_deps =
    jgromes/RadioLib@^7.0.0
    olikraus/U8g2@^2.35.30
    h2zero/NimBLE-Arduino@^1.4.2
build_flags =
    ${env.build_flags}
    -DDEVICE_HELTEC_V4
    ; Sidetone is an I2S stream into a MAX98357A class-D amp (see sidetone.cpp /
    ; docs/components/max98357a.md). The old PWM/PAM8403 LEDC paths and their
    ; -DSIDETONE_SQUARE switch are gone.
    ; MAX98357A I2S pin map (authoritative — pins.h falls back to these if unset):
    ;   GPIO48 -> BCLK, GPIO4 -> LRC, GPIO47 -> DIN.
    -DPIN_I2S_BCLK=48
    -DPIN_I2S_LRCLK=4
    -DPIN_I2S_DIN=47

[env:cardputer_adv]
board = m5stack-stamps3
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
; Radio is the removable Cap LoRa-1262 (bare SX1262, no external PA): max TX is
; the chip ceiling +22 dBm. M5Unified drives the ES8311 codec (sidetone via
; M5.Speaker) and the ST7789V2 LCD (display via M5.Display / M5GFX); it bundles
; M5GFX, so no separate LovyanGFX dep is needed.
lib_deps =
    jgromes/RadioLib@^7.0.0
    m5stack/M5Unified@^0.2.2
    h2zero/NimBLE-Arduino@^1.4.2
build_flags =
    ${env.build_flags}
    -DDEVICE_CARDPUTER_ADV
